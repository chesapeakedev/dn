name: Denoise Build

on:
  workflow_dispatch:
    inputs:
      issue_url:
        description: "GitHub issue URL"
        required: true
        type: string
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  reject-untrusted:
    if: >
      github.event.label.name == 'denoise-build' &&
      !(github.event.sender.association == 'OWNER' ||
        github.event.sender.association == 'MEMBER' ||
        github.event.sender.association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Install dn
        uses: chesapeake/dn-action@v1

      - name: Explain maintainer-only label
        run: |
          cat > /tmp/comment.md << 'EOF'
          Thanks for the request! The `denoise-build` label can only be used by project maintainers because it consumes resources. A maintainer can re-apply the label if they decide to proceed.
          EOF
          dn issue comment ${{ github.event.issue.number }} --body-file /tmp/comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    if: >
      github.event.label.name == 'denoise-build' &&
      (github.event.sender.association == 'OWNER' ||
       github.event.sender.association == 'MEMBER' ||
       github.event.sender.association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue.outputs.number }}
      issue_url: ${{ steps.issue.outputs.url }}
      success: ${{ steps.kickstart.outputs.success }}
      pr_url: ${{ steps.kickstart.outputs.pr_url }}
      output: ${{ steps.kickstart.outputs.output }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ">=2.6.3"

      - name: Install dn
        uses: chesapeake/dn-action@v1

      - name: Capture issue metadata
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ISSUE_URL="${{ github.event.inputs.issue_url }}"
          else
            ISSUE_URL="${{ github.event.issue.html_url }}"
          fi
          echo "url=$ISSUE_URL" >> $GITHUB_OUTPUT
          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$')
          echo "number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Run dn kickstart (opencode AWP)
        id: kickstart
        env:
          IS_OPEN_SOURCE: "true"
          NO_COLOR: "1"
        run: |
          OUTPUT=$(dn --awp --opencode "${{ steps.issue.outputs.url }}" 2>&1) || EXIT_CODE=$?

          PR_URL=$(echo "$OUTPUT" | grep -oP 'PR created: \K[^\s]+' || true)

          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "$PR_URL" ]; then
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

          exit ${EXIT_CODE:-0}

  comment:
    needs: build
    if: always() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Install dn
        uses: chesapeake/dn-action@v1

      - name: Post kickstart results
        run: |
          SUCCESS="${{ needs.build.outputs.success }}"
          PR_URL="${{ needs.build.outputs.pr_url }}"
          OUTPUT="${{ needs.build.outputs.output }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            LABELER="${{ github.actor }}"
            TRIGGER="workflow dispatch"
          else
            LABELER="${{ github.event.sender.login }}"
            TRIGGER="\`denoise-build\` label"
          fi

          if [ "$SUCCESS" = "true" ]; then
            STATUS="✅ Success"
          else
            STATUS="❌ Failed"
          fi

          {
            echo "## Denoise Build"
            echo ""
            echo "**Triggered by:** @$LABELER via $TRIGGER"
            echo "**Status:** $STATUS"
            echo ""
            if [ -n "$PR_URL" ]; then
              echo "**PR:** $PR_URL"
              echo ""
            fi
            echo "<details>"
            echo "<summary>Output</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo "</details>"
          } > /tmp/comment.md

          dn issue comment ${{ needs.build.outputs.issue_number }} --body-file /tmp/comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
