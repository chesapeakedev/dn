name: Release Binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: dn-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: dn-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: dn-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: dn-macos-arm64
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            binary: dn-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2

      - name: Build binary
        run: |
          deno compile \
            --allow-all \
            --config deno.json \
            --target ${{ matrix.target }} \
            -o ${{ matrix.binary }} \
            cli/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dn-* > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          files: |
            dn-*
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
